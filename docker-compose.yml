version: "3.9"

services:

  postgres:
    image: postgres:17
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: userdb
    ports:
      - "5433:5432"

  user-service:
    build:
      context: ./services/user-service
    container_name: user-service
    restart: always
    depends_on:
      - postgres
    environment:
      APP_NAME: User Service
      APP_VERSION: 1.0.0
      ENVIRONMENT: development
      DATABASE_URL: postgresql://admin:admin123@postgres:5432/userdb
    ports:
      - "8001:8000"

  product-service:
    build:
      context: ./services/product-service
    container_name: product-service
    restart: always
    depends_on:
      - postgres
    environment:
      APP_NAME: Product Service
      APP_VERSION: 1.0.0
      ENVIRONMENT: development
      DATABASE_URL: postgresql://admin:admin123@postgres:5432/userdb
    ports:
      - "8002:8000"